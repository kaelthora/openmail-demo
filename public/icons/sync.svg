<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="syncGrad" x1="4" y1="4" x2="20" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="currentColor" stop-opacity="1">
        <animate attributeName="stop-opacity" values="0.9;1;0.9" dur="2.8s" repeatCount="indefinite" />
      </stop>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.92" />
    </linearGradient>
    <radialGradient id="syncLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(12 12) rotate(90) scale(9 10)">
      <stop offset="0" stop-color="currentColor" stop-opacity="1" />
      <stop offset="1" stop-color="currentColor" stop-opacity="0.9" />
    </radialGradient>
    <filter id="syncGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <path d="M4 12a8 8 0 0 1 14-5" stroke="url(#syncGrad)" stroke-width="2.6" opacity="0.95" filter="url(#syncGlow)" />
  <path d="M20 12a8 8 0 0 1-14 5" stroke="url(#syncGrad)" stroke-width="2.6" opacity="0.95" filter="url(#syncGlow)" />
  <path d="M4 12a8 8 0 0 1 14-5" stroke="url(#syncGrad)" stroke-width="2.2" opacity="0.96" />
  <path d="M20 12a8 8 0 0 1-14 5" stroke="url(#syncGrad)" stroke-width="2.2" opacity="0.96" />
  <path d="M4 12a8 8 0 0 1 14-5" stroke="url(#syncLight)" stroke-width="1.3" opacity="0.92" />
</svg>
